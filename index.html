<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élise Beaudin | Oceanographer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar" id="custom-sidebar"></nav>

    <main class="content">
        <div class="hero-gif" style="background-image: url('under.gif');"></div>
    </main>

    <script>
        fetch('sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('custom-sidebar').innerHTML = data;
                
                // Souligne la page active (HOME) basé sur l'URL
                const currentPage = window.location.pathname.split("/").pop() || "index.html";
                const links = document.querySelectorAll('.nav-links a');
                links.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });
            });
    </script>

</body>
</html>
